<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar | Atletic Store</title>
<link href="style.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;700&family=Barlow+Condensed:wght@700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  .login-page {
    min-height: calc(100vh - 180px);
    display: flex; align-items: center; justify-content: center;
    background: var(--light-gray); padding: 48px 24px;
  }
  .auth-card {
    background: var(--white); border: 1.5px solid var(--black);
    width: 100%; max-width: 440px; box-shadow: 6px 6px 0 var(--black);
  }
  .auth-card-header {
    padding: 28px 32px 0;
  }
  .auth-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 38px;
    letter-spacing: 0.02em; line-height: 1; margin-bottom: 6px;
  }
  .auth-title span { color: var(--red); }
  .auth-sub { font-size: 13px; color: var(--gray); margin-bottom: 28px; }

  .auth-body { padding: 0 32px 32px; }

  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block; font-size: 11px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--black); margin-bottom: 7px;
  }
  .form-group input {
    width: 100%; height: 46px; border: 1.5px solid var(--border);
    padding: 0 14px; font-family: 'Barlow', sans-serif; font-size: 14px;
    color: var(--black); background: var(--white); outline: none;
    transition: border-color 0.2s; border-radius: 0; -webkit-appearance: none;
  }
  .form-group input:focus { border-color: var(--black); }
  .form-group input.has-error { border-color: var(--red); }

  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 46px; }
  .pw-toggle {
    position: absolute; right: 0; top: 0; height: 46px; width: 46px;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--gray); transition: color 0.2s;
  }
  .pw-toggle:hover { color: var(--black); }

  .field-err { font-size: 11px; color: var(--red); margin-top: 5px; display: none; }

  .auth-alert {
    padding: 12px 14px; font-size: 13px; font-weight: 500;
    margin-bottom: 20px; display: none; border-left: 3px solid;
  }
  .auth-alert.error   { background: #fff0f0; border-color: var(--red); color: var(--red); }
  .auth-alert.success { background: #f0fff5; border-color: #1a7a3a; color: #1a7a3a; }

  .auth-submit {
    width: 100%; height: 50px; background: var(--black); color: var(--white);
    border: none; font-family: 'Barlow Condensed', sans-serif; font-size: 16px;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s; margin-top: 6px;
  }
  .auth-submit:hover   { background: var(--red); }
  .auth-submit:disabled { background: #aaa; cursor: not-allowed; }

  .auth-hint {
    font-size: 13px; color: var(--gray); text-align: center; margin-top: 20px;
  }
  .auth-hint a {
    color: var(--red); font-weight: 700; text-decoration: none;
  }
  .auth-hint a:hover { text-decoration: underline; }

  .auth-divider {
    display: flex; align-items: center; gap: 12px; margin: 24px 0;
    color: var(--gray); font-size: 12px;
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  @media (max-width: 520px) {
    .auth-card-header, .auth-body { padding-left: 20px; padding-right: 20px; }
    .auth-card { box-shadow: none; }
  }
</style>
</head>
<body>

<div class="topbar">🔒 Acesso seguro — Seus dados são protegidos</div>

<header>
  <div class="header-inner" style="grid-template-columns:1fr;justify-items:center;">
    <a class="logo" href="atletic-store.html" style="align-items:center;">
      <span class="logo-main">Atletic Store</span>
      <span class="logo-sub" style="text-align:center;">Performance &amp; Estilo</span>
    </a>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <a class="nav-link" href="atletic-store.html">Início</a>
    <a class="nav-link" href="futebol.html">Futebol</a>
    <a class="nav-link" href="basquete.html">Basquete</a>
    <a class="nav-link" href="volei.html">Vôlei</a>
  </div>
</nav>

<div class="login-page">
  <div class="auth-card">

    <div class="auth-card-header">
      <div class="auth-title">Bem-vindo <span>de volta</span></div>
      <div class="auth-sub">Entre com sua conta para continuar comprando</div>
    </div>

    <div class="auth-body">

      <div class="auth-alert" id="login-alert"></div>

      <form id="form-login" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
          <div class="field-err" id="err-login-email"></div>
        </div>
        <div class="form-group">
          <label for="login-pw">Senha</label>
          <div class="pw-wrap">
            <input type="password" id="login-pw" placeholder="Sua senha" autocomplete="current-password">
            <button type="button" class="pw-toggle" onclick="togglePw('login-pw', this)" tabindex="-1">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="field-err" id="err-login-pw"></div>
        </div>

        <button type="submit" class="auth-submit" id="btn-login">Entrar</button>
      </form>

      <div class="auth-divider">ou</div>

      <div class="auth-hint" style="margin-top:0;">
        Ainda não tem conta? <a href="cadastro.html">Criar conta grátis</a>
      </div>

    </div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-bottom">
      <span>© 2026 Atletic Store. Todos os direitos reservados.</span>
    </div>
  </div>
</footer>

<script src="auth.js"></script>
<script>
if (authIsLoggedIn()) {
  const _redir = sessionStorage.getItem('atletic_redirect') || '';
  sessionStorage.removeItem('atletic_redirect');
  const _dest = (_redir && !_redir.includes('login.html') && !_redir.includes('cadastro.html'))
    ? _redir : authDefaultDest(authGetSession());
  window.location.href = _dest;
}

const EYE_OPEN   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
const EYE_CLOSED = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;

function togglePw(id, btn) {
  const input = document.getElementById(id);
  const show = input.type === 'password';
  input.type = show ? 'text' : 'password';
  btn.querySelector('svg').innerHTML = show ? EYE_CLOSED : EYE_OPEN;
}

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'auth-alert ' + type; el.style.display = 'block';
}
function hideAlert(id) { document.getElementById(id).style.display = 'none'; }
function fieldErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
  const input = el.previousElementSibling?.querySelector?.('input') || el.previousElementSibling;
  if (input?.tagName === 'INPUT') input.classList.toggle('has-error', !!msg);
}
function clearFieldErr(id) { fieldErr(id, ''); }

async function handleLogin(e) {
  e.preventDefault();
  hideAlert('login-alert');
  clearFieldErr('err-login-email');
  clearFieldErr('err-login-pw');

  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-pw').value;
  let valid = true;

  if (!email)    { fieldErr('err-login-email', 'Informe o e-mail.'); valid = false; }
  if (!password) { fieldErr('err-login-pw', 'Informe a senha.'); valid = false; }
  if (!valid) return;

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Entrando...';

  const res = await authLogin(email, password);

  btn.disabled = false; btn.textContent = 'Entrar';

  if (res.ok) {
    showAlert('login-alert', `✔ Bem-vindo, ${res.user.name.split(' ')[0]}! Redirecionando...`, 'success');
    setTimeout(() => {
      const dest = sessionStorage.getItem('atletic_redirect') || authDefaultDest(res.user);
      sessionStorage.removeItem('atletic_redirect');
      window.location.href = dest;
    }, 1000);
  } else {
    showAlert('login-alert', res.error, 'error');
  }
}
</script>
<script src="accessibility.js"></script>

</body>
</html>
